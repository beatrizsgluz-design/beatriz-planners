<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fitness Planner</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #fff7fb, #fde5ef, #f4c7da);
      color: #6b4253;
    }

    main {
      width: min(100%, 720px);
      padding: 48px 32px;
      text-align: center;
      border: 1px solid rgba(194, 91, 132, 0.22);
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.82);
      box-shadow: 0 24px 60px rgba(143, 57, 92, 0.16);
    }

    .icon {
      display: grid;
      place-items: center;
      width: 66px;
      height: 66px;
      margin: 0 auto 18px;
      border-radius: 22px;
      background: #fff0f6;
      color: #a13f65;
      font-size: 28px;
    }

    h1 {
      margin: 0;
      color: #963957;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(40px, 7vw, 64px);
      font-style: italic;
      letter-spacing: -2px;
    }

    p {
      max-width: 470px;
      margin: 16px auto 0;
      color: #956d7d;
      font-size: 16px;
      line-height: 1.6;
    }

    .status {
      display: inline-block;
      margin-top: 24px;
      padding: 9px 13px;
      border-radius: 999px;
      background: #fff0f6;
      color: #a13f65;
      font-size: 12px;
      font-weight: 700;
    }
  </style>
</head>

<body>
  <main>
    <div class="icon">✦</div>

    <h1>Fitness Planner</h1>

    <p>
      Estrutura online criada com sucesso.
      Em breve: treino do dia, check-in, hidratação e histórico sincronizado.
    </p>

    <div class="status">Projeto em construção</div>
  </main>
</body>
</html>
